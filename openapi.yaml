openapi: 3.0.0
info:
  title: HikingFit API
  description: Dokumentasi backend API untuk HikingFit. Didesain dengan struktur respons yang konsisten agar mudah dikonsumsi dan diubah menjadi model oleh tim frontend.
  version: 1.0.0
  contact:
    name: Backend Team
servers:
  - url: http://localhost:3000/api
    description: Local Development Server
  - url: https://api.hikingfit.example.com/api
    description: Production Server

# Konfigurasi Autentikasi (berdasarkan authMiddleware.js & firebase.js)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Masukkan token JWT/Firebase dari proses login.

  # Schema Standar agar respons mudah diparse oleh Frontend
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Operasi berhasil"
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Pesan error untuk frontend"
    Mountain:
      type: object
      properties:
        id:
          type: string
          example: "MNT-001"
        name:
          type: string
          example: "Gunung Rinjani"
        elevation:
          type: integer
          example: 3726
        location:
          type: string
          example: "Lombok, Nusa Tenggara Barat"
    Trail:
      type: object
      properties:
        id:
          type: string
          example: "TRL-001"
        mountainId:
          type: string
          example: "MNT-001"
        name:
          type: string
          example: "Jalur Sembalun"
        difficulty:
          type: string
          example: "Hard"
    Weather:
      type: object
      properties:
        mountainId:
          type: string
          example: "MNT-001"
        condition:
          type: string
          example: "Cerah Berawan"
        temperature:
          type: integer
          example: 18
        lastUpdated:
          type: string
          format: date-time

security:
  - bearerAuth: []

paths:
  # ==========================================
  # AUTH ROUTES
  # ==========================================
  /auth/login:
    post:
      summary: Login Pengguna
      tags: [Auth]
      security: [] # Endpoint ini tidak perlu token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login berhasil, mengembalikan token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6..."

  # ==========================================
  # MOUNTAIN ROUTES
  # ==========================================
  /mountains:
    get:
      summary: Ambil Semua Data Gunung
      tags: [Mountains]
      responses:
        '200':
          description: Berhasil mengambil daftar gunung.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Mountain'

  /mountains/{id}:
    get:
      summary: Ambil Detail Gunung Berdasarkan ID
      tags: [Mountains]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Berhasil mengambil detail gunung.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Mountain'
        '404':
          description: Gunung tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==========================================
  # TRAIL ROUTES
  # ==========================================
  /trails/mountain/{mountainId}:
    get:
      summary: Ambil Jalur Pendakian Berdasarkan ID Gunung
      tags: [Trails]
      parameters:
        - in: path
          name: mountainId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Berhasil mengambil daftar jalur.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Trail'

  # ==========================================
  # WEATHER ROUTES
  # ==========================================
  /weather/{mountainId}:
    get:
      summary: Ambil Data Cuaca Pakar
      description: Mengambil data cuaca terbaru untuk gunung tertentu (disinkronisasi oleh cron_pakar).
      tags: [Weather]
      parameters:
        - in: path
          name: mountainId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Berhasil mengambil data cuaca.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Weather'